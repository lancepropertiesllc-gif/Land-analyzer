    color: "#1f2937"

  builder_a:
    name: "Ballwin Builder"
    password: "builder2024"
    role: "client"
    color: "#1d4ed8"
    criteria:
      geography:
        county: "St. Louis"
        municipality: "Ballwin"
        school_districts: ["ROCKWOOD"]
      lot:
