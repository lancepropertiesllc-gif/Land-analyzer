      deal_types:
        - "Vacant Land"
        - "Teardown Candidate"
        - "Large Lot"
      scoring:
        min_lead_score: 30
        exclude_flood_zone: true
    contact:
      name: "Your Name"
      company: "Your Company"
      phone: "(314) XXX-XXXX"
      email: "you@yourcompany.com"

